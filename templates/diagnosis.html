<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnosis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            background-color: #f0f0f0;
            padding: 20px;
            background-image: url("{{ url_for('static', filename='Images/diagnosisbg.jpeg') }}")

        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2); 
            background-image: linear-gradient(to bottom, #f9f9f9, #fff); 
            margin-top: 50px; 
            border: 1px solid #ccc; 
        }


        form {
            margin-bottom: 20px;
            padding-top: 40px;
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333; 
            font-size: 18px; 
            font-family: Arial, sans-serif; 
            text-transform: uppercase; 
        }
        label[for="diagnosis_result"] {
            margin-right: 60px; 
            }


        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2); 
            margin-bottom: 10px; 
            border: 4px solid #ccc; 
            border-radius: 80%; 
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 18px; 
            border-radius: 4px;
            cursor: pointer;
            margin-top: 18px; 
            margin-left: 30px;
            transition: background-color 0.3s ease; 
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); 
            font-weight: bold; 
        }

        button:hover {
            background-color: #45a049;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4); 
            transform: translateY(-2px); 
        }

        a {
            color: #007bff;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            margin-left: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        a:hover {
            text-decoration: underline;
            color: #0069d9; 
            transform: translateY(-2px); 
        }

        
        @media screen and (max-width: 768px) {
            .container {
                max-width: 100%; 
                padding: 15px; 
                border-radius: 0; 
            }
            form {
                flex-direction: column; 
            }
            label {
                font-size: 16px; 
            }
            button {
                font-size: 16px; 
            }
            a {
                font-size: 16px; 
            }
            
        }

        
        input[type="text"], input[type="email"], input[type="password"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            font-family: Arial, sans-serif;
            width: 100%;
            margin-bottom: 20px;
        }

        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Diagnosis for Record {{ record.id }}</h1>
        <p>{{ message }}</p>
        <form method="post">
            <label for="diagnosis_result">Diagnosis Result:.  </label>
            <div>
                <input type="radio" id="healthy" name="diagnosis_result" value="Healthy" {% if record.diagnosis_result == 'Healthy' %}checked{% endif %}>
                <label for="healthy">Healthy</label><br>
                <input type="radio" id="injured" name="diagnosis_result" value="Injured" {% if record.diagnosis_result == 'Injured' %}checked{% endif %}>
                <label for="injured">Injured</label><br>
                <input type="radio" id="critical" name="diagnosis_result" value="Critical" {% if record.diagnosis_result == 'Critical' %}checked{% endif %}>
                <label for="critical">Critical</label><br>
            </div>
            <button type="submit">Submit</button>
        </form>
        <a href="{{ url_for('index') }}">Back to home page</a>
        </div>
</body>
</html>
